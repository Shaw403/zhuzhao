<!DOCTYPE html>
<html><head><script src="lib/tesseract.min.js"></script></head>
<body><script>
var worker=null;
var extUrl=function(p){return chrome.runtime.getURL(p)};
chrome.runtime.onMessage.addListener(function(msg,sender,sendResponse){
  if(msg.type!=="OCR_RECOGNIZE")return false;
  var base64=msg.imageBase64;
  var ocrId=msg.ocrId;
  var doWork=function(w){
    w.recognize(base64).then(function(r){
      var text=(r.data.text||"").trim().replace(/[^a-zA-Z0-9]/g,"");
      var conf=r.data.confidence||0;
      console.log("[ocr] result:",text,"confidence:",conf);
      chrome.runtime.sendMessage({type:"OCR_RESULT",text:text,ocrId:ocrId});
    }).catch(function(e){
      console.log("[ocr] error:",e.message);
      chrome.runtime.sendMessage({type:"OCR_RESULT",text:"",error:e.message,ocrId:ocrId});
    });
  };
  if(worker){doWork(worker)}
  else{
    console.log("[ocr] Creating Tesseract worker...");
    Tesseract.createWorker("eng",1,{
      workerPath:extUrl("lib/tesseract-worker.min.js"),
      corePath:extUrl("lib/tesseract-core-simd.wasm.js"),
      langPath:extUrl("lib")
    }).then(function(w){
      console.log("[ocr] Worker created");
      worker=w;
      doWork(w);
    }).catch(function(e){
      console.log("[ocr] Worker creation failed:",e.message);
      chrome.runtime.sendMessage({type:"OCR_RESULT",text:"",error:"Tesseract初始化失败:"+e.message,ocrId:ocrId});
    });
  }
  return false;
});
</script></body></html>
